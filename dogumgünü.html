<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İyi ki Doğdun 🩵</title>

<style>
body {
margin: 0;
background: black;
overflow: hidden;
font-family: 'Courier New', monospace;
color: #9be7ff;
}

.container {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
text-align: center;
width: 80%;
}

h1 {
font-size: 40px;
text-shadow: 0 0 10px #00eaff, 0 0 20px #00eaff;
margin-bottom: 20px;
}

p {
font-size: 18px;
line-height: 1.6;
text-shadow: 0 0 5px #00eaff;
white-space: pre-line;
}

.heart {
position: absolute;
color: #00eaff;
font-size: 20px;
animation: float 6s linear infinite;
opacity: 0.8;
}

@keyframes float {
0% {
transform: translateY(100vh) scale(0.5);
opacity: 0;
}
50% {
opacity: 1;
}
100% {
transform: translateY(-10vh) scale(1.2);
opacity: 0;
}
}
</style>
</head>

<body>

<div class="container">
<h1>🩵İyi ki Doğdun Sevgilim 🩵</h1>
<p id="message"></p>
</div>

<script>
const text = `Doğum günün kutlu olsun sevgilim...
İyi ki varsın ve benimlesin.

Yeni yaşın sana mutluluklar getirsin,
hep mutlu olursunn.

Yanında değilim ama unutma ki
kalbimin en derin yerinde
bu günü kutluyorum.

Bugün ve her zaman
seni düşünen ve seven birinin olduğunu unutma hayatım.

Seninle var olan her şeyi seviyorum.
Hayata tutunmak için en güzel sebebimsin.

Sevmek yaşamaksa,
ben seninle yaşamak istiyorum.

Seni bir gün görüp
sana sarılıp hiç bırakmamayı hayal ediyorum...

Seni anlatmaya kelimeler yetmiyor.
İyi ki varsın sevgilim,
ve yeniden iyi ki doğdun 🩵`;

let i = 0;
function typing() {
if (i < text.length) {
document.getElementById("message").innerHTML += text.charAt(i);
i++;
setTimeout(typing, 30);
}
}
typing();

// Kalpler
function createHeart() {
const heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML = "🩵";
heart.style.left = Math.random() * 100 + "vw";
heart.style.fontSize = (Math.random() * 20 + 10) + "px";
document.body.appendChild(heart);

setTimeout(() => {
heart.remove();
}, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
